# claims.toml: the CKC claim registry (science profile, and proof claims that want a slug).
#
# One entry per claim/hypothesis/finding. The slug (the table key) is what commit footers
# reference as `conjecture:<slug>` / `claim:<slug>` / `result:<slug>`. The `status` field is a
# CACHE of the effective status computed from the commit graph. Regenerate it, don't treat it as
# the source of truth. See identifiers.md and claimgraph.md.
#
# This file is an EXAMPLE seeded with the IGL claims used throughout the spec.

[claims.master-formula]
kind      = "conjecture"
statement = "The Green's integral factorises as a finite separable rank-K×R sum (Master Formula)."
status    = "math.machine-checked"
lean      = "IGL.fubini_factorization"
created   = "2026-06-14"

[claims.naive-separable]
kind      = "conjecture"
statement = "The Green's kernel factorises separably without metric compensation."
status    = "math.disproved"
created   = "2026-06-14"

[claims.tensor-rank-helps]
kind      = "hypothesis"
statement = "Tensor rank K>1 beats K=1 on non-additive targets."
status    = "sci.not-replicated"
prereg    = "osf.io/abcd1"
doi       = ""
created   = "2026-06-14"
